<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIO Downloader — Setup</title>
  <style>
    /* ── Reset & Base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Custom title bar (frameless window) ── */
    .titlebar {
      -webkit-app-region: drag;          /* Makes the bar draggable like a real title bar */
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: #13151d;
      border-bottom: 1px solid #1e2030;
      font-size: 11px;
      color: #71717a;
      flex-shrink: 0;
    }

    .titlebar-text { flex: 1; }

    .close-btn {
      -webkit-app-region: no-drag;       /* Close button must be clickable, not draggable */
      background: none;
      border: none;
      color: #71717a;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .close-btn:hover { background: #ef4444; color: white; }

    /* ── Main content area ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 40px 32px;
    }

    /* ── App branding ── */
    .app-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 2px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 28px;
    }

    /* ── Progress section ── */
    .step-label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 10px;
      min-height: 18px;
      text-align: center;
    }

    .progress-track {
      width: 100%;
      max-width: 380px;
      height: 6px;
      background: #1a1d27;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Animated stripes — shown during install steps where we
       don't have an exact download percentage to show */
    .progress-fill.working {
      background: repeating-linear-gradient(
        -45deg,
        #6366f1 0px, #6366f1 10px,
        #7c7ff7 10px, #7c7ff7 20px
      );
      background-size: 28px 100%;
      animation: barber 0.6s linear infinite;
    }

    @keyframes barber {
      from { background-position: 0 0; }
      to { background-position: 28px 0; }
    }

    .step-counter {
      font-size: 10px;
      color: #52525b;
      margin-bottom: 20px;
    }

    /* ── Error box ── */
    .error-box {
      display: none;
      width: 100%;
      max-width: 440px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #f87171;
      word-break: break-word;
      /* Long errors (e.g. multi-line ImportError) used to push the
         log toggle off-screen; cap height and let the box scroll instead. */
      max-height: 110px;
      overflow-y: auto;
    }
    .error-box.visible { display: block; }

    /* ── Buttons ── */
    .btn-row {
      display: none;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-row.visible { display: flex; }

    .btn {
      padding: 7px 22px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      -webkit-app-region: no-drag;
    }

    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #5558e6; }

    .btn-ghost {
      background: transparent;
      color: #71717a;
      border: 1px solid #2a2d3a;
    }
    .btn-ghost:hover { color: #e4e4e7; border-color: #52525b; }

    /* ── Log panel (expandable) ── */
    .log-toggle {
      font-size: 10px;
      color: #52525b;
      cursor: pointer;
      user-select: none;
      margin-bottom: 6px;
      -webkit-app-region: no-drag;
    }
    .log-toggle:hover { color: #a1a1aa; }

    .log-panel {
      width: 100%;
      max-width: 460px;
      height: 0;
      background: #13151d;
      border: 1px solid #1e2030;
      border-radius: 6px;
      padding: 0;
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 10px;
      line-height: 1.5;
      color: #a1a1aa;
      overflow-y: auto;
      transition: height 0.2s ease, padding 0.2s ease;
    }
    .log-panel.visible {
      height: 160px;
      padding: 8px 12px;
    }

    /* ── Success state ── */
    .success-check {
      display: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      font-size: 24px;
      line-height: 48px;
      text-align: center;
      margin-bottom: 10px;
    }
    .success-check.visible { display: block; }
  </style>
</head>
<body>

  <!-- Custom title bar (because window is frameless) -->
  <div class="titlebar">
    <span class="titlebar-text">AIO Downloader — First Time Setup</span>
    <button class="close-btn" id="closeBtn" title="Quit">✕</button>
  </div>

  <div class="content">
    <!-- Success checkmark (hidden until complete) -->
    <div class="success-check" id="successCheck">✓</div>

    <div class="app-name">AIO Downloader</div>
    <p class="subtitle" id="subtitle">Setting up Python environment…</p>

    <!-- Progress display -->
    <div class="step-label" id="stepLabel">Preparing…</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="step-counter" id="stepCounter"></div>

    <!-- Error display (hidden until error) -->
    <div class="error-box" id="errorBox"></div>
    <div class="btn-row" id="btnRow">
      <button class="btn btn-primary" id="retryBtn">Retry</button>
      <button class="btn btn-ghost" id="quitBtn">Quit</button>
    </div>

    <!-- Expandable log panel -->
    <div class="log-toggle" id="logToggle">▶ Show logs</div>
    <div class="log-panel" id="logPanel"></div>
  </div>

  <script>
    // ── Shorthand ──
    const $ = (id) => document.getElementById(id);

    // ── State ──
    let logsVisible = false;
    let currentStep = 0;
    let totalSteps = 7;

    // ════════════════════════════════════════════
    // UI HELPERS
    // ════════════════════════════════════════════

    function toggleLogs() {
      logsVisible = !logsVisible;
      $("logPanel").classList.toggle("visible", logsVisible);
      $("logToggle").textContent = logsVisible ? "▼ Hide logs" : "▶ Show logs";
    }

    function addLog(line) {
      const panel = $("logPanel");
      panel.textContent += line + "\n";
      // Auto-scroll to bottom so newest log is visible
      panel.scrollTop = panel.scrollHeight;
    }

    /**
     * Update the progress bar.
     * @param {number} subProgress - Progress within the current step (0.0 to 1.0)
     */
    function setProgress(subProgress) {
      // Overall % = completed steps + current step's sub-progress
      const overall = ((currentStep - 1) + subProgress) / totalSteps * 100;
      $("progressFill").style.width = Math.min(100, Math.max(0, overall)) + "%";
    }

    function showError(msg) {
      $("errorBox").textContent = msg;
      $("errorBox").classList.add("visible");
      $("btnRow").classList.add("visible");
      $("progressFill").classList.remove("working");
      // Auto-expand the log panel — when something fails the user almost
      // always wants the full traceback. Saves a click and avoids the
      // off-screen-toggle bug entirely (toggle is now redundant for errors,
      // but kept around for users who want to peek at the log mid-install).
      if (!logsVisible) {
        toggleLogs();
      }
    }

    function hideError() {
      $("errorBox").classList.remove("visible");
      $("btnRow").classList.remove("visible");
    }

    function showComplete() {
      $("stepLabel").textContent = "Setup complete!";
      $("subtitle").textContent = "Launching app…";
      $("progressFill").style.width = "100%";
      $("progressFill").classList.remove("working");
      $("stepCounter").textContent = "";
      $("successCheck").classList.add("visible");
    }

    // ════════════════════════════════════════════
    // IPC LISTENERS (messages from main process)
    // ════════════════════════════════════════════

    // A new step started
    window.electronAPI.onSetupStep(({ step, total, label }) => {
      currentStep = step;
      totalSteps = total;
      $("stepLabel").textContent = label;
      $("stepCounter").textContent = "Step " + step + " of " + total;
      // Show animated stripes (we don't know exact progress for install steps)
      $("progressFill").classList.add("working");
      setProgress(0);
    });

    // A log line was emitted
    window.electronAPI.onSetupLog((line) => {
      addLog(line);
    });

    // Download progress within a step (0.0 to 1.0)
    window.electronAPI.onSetupProgress((fraction) => {
      // Switch from animated stripes to smooth fill
      $("progressFill").classList.remove("working");
      setProgress(fraction);
    });

    // Setup finished successfully
    window.electronAPI.onSetupComplete(() => {
      showComplete();
    });

    // A step failed
    window.electronAPI.onSetupError((msg) => {
      showError(msg);
    });

    // ════════════════════════════════════════════
    // BUTTON HANDLERS
    // ════════════════════════════════════════════

    $("logToggle").addEventListener("click", toggleLogs);

    $("retryBtn").addEventListener("click", () => {
      hideError();
      $("progressFill").style.width = "0%";
      $("stepLabel").textContent = "Retrying…";
      window.electronAPI.retrySetup();
    });

    $("quitBtn").addEventListener("click", () => {
      window.electronAPI.quitApp();
    });

    $("closeBtn").addEventListener("click", () => {
      window.electronAPI.quitApp();
    });
  </script>
</body>
</html>
